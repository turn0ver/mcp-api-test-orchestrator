name: API Tests

on:
  # Trigger on push to main and pull requests
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Allow manual triggering with custom inputs
  workflow_dispatch:
    inputs:
      collection_path:
        description: 'Path to the collection JSON file'
        required: true
        default: './examples/collection.json'
      test_filter:
        description: 'Filter tests to run (e.g., "status,performance")'
        required: false

jobs:
  api-tests:
    runs-on: ubuntu-latest

    strategy:
      # Parallelize test execution (split into groups if needed)
      matrix:
        group: [1]

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Build the project
      - name: Build the MCP server
        run: npm run build

      # Step 5: Generate tests
      - name: Generate Playwright tests
        run: |
          node --import tsx/esm src/agents/run-generate.ts ${{ inputs.collection_path }} tests/

      # Step 6: Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install chromium

      # Step 7: Run tests
      - name: Run Playwright tests
        run: npm test

      # Step 8: Upload test artifacts (HTML report, logs, etc.)
      - name: Upload Test Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: ./tests/reports/

      # Step 9: Post a comment on PR with test results (if failure)
      - name: Post Test Results to PR
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚨 API Tests Failed! Check the [HTML Report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.run_id }}) for details.`
            })

      # Step 10: Notify Slack (optional)
      - name: Notify Slack
        if: failure()
        uses: slackapi/slack-github-action@v1.23.0
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          channel-id: 'C12345678'
          text: '🚨 API Tests Failed! Check the GitHub Actions logs for details.'
