name: API Tests CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      collection_path:
        description: "Path to the collection JSON file"
        required: false
        default: "examples/collection.json"

jobs:
  api-tests:
    name: Generate & Run API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout & Node setup
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # -----------------------------------------------------------------------
      # 2. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # 3. Install Playwright browsers (API tests only need chromium engine-less runner)
      # -----------------------------------------------------------------------
      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      # -----------------------------------------------------------------------
      # 4. TypeScript type-check (lint)
      # -----------------------------------------------------------------------
      - name: Type-check (lint)
        run: npm run lint

      # -----------------------------------------------------------------------
      # 5. Build the MCP server
      # -----------------------------------------------------------------------
      - name: Build
        run: npm run build

      # -----------------------------------------------------------------------
      # 6. Generate Playwright tests from the example collection via the
      #    individual agent scripts (no MCP transport needed for CI)
      # -----------------------------------------------------------------------
      - name: Generate tests from collection
        run: |
          COLLECTION="${{ github.event.inputs.collection_path || 'examples/collection.json' }}"
          node --import tsx/esm src/agents/run-generate.ts "$COLLECTION" tests/
        env:
          NODE_OPTIONS: ""

      # -----------------------------------------------------------------------
      # 7. Run the generated Playwright tests
      # -----------------------------------------------------------------------
      - name: Run Playwright tests
        run: npm test -- --reporter=list,html,json
        env:
          CI: "true"

      # -----------------------------------------------------------------------
      # 8. Upload test artifacts
      # -----------------------------------------------------------------------
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-json
          path: test-results/results.json
          retention-days: 30

      # -----------------------------------------------------------------------
      # 9. Post a summary to the job
      # -----------------------------------------------------------------------
      - name: Summarise results
        if: always()
        run: |
          echo "## API Test Results" >> "$GITHUB_STEP_SUMMARY"
          if [ -f test-results/results.json ]; then
            node --input-type=module << 'EOF'
          import fs from "fs";
          const data = JSON.parse(fs.readFileSync("test-results/results.json", "utf8"));
          const s = data.stats || {};
          console.log(`| Metric | Count |`);
          console.log(`|--------|-------|`);
          console.log(`| ✅ Passed  | ${s.expected  ?? 0} |`);
          console.log(`| ❌ Failed  | ${s.unexpected ?? 0} |`);
          console.log(`| ⏭ Skipped | ${s.skipped    ?? 0} |`);
          console.log(`| ⏱ Duration | ${(s.duration ?? 0).toFixed(0)}ms |`);
          EOF
          else
            echo "No results file found."
          fi >> "$GITHUB_STEP_SUMMARY"
